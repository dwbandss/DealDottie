<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>DealDot AI Dashboard</title>

<link rel="stylesheet" href="../css/dashboard.css">

</head>

<body>

<div class="global-halo"></div>

<!-- ================= AI BOOT ================= -->

<div id="aiBoot">
<div class="boot-center">
<h2>Initializing Deal Intelligence</h2>
<div id="bootSteps"></div>
</div>
</div>

<!-- ================= HEADER ================= -->

<header class="header">

<div class="logo">DD</div>

<nav>
<a data-page="dashboard">Dashboard</a>
<a data-page="deals">Deals</a>
<a data-page="insights">Insights</a>
<a data-page="history">History</a>
</nav>

<div class="header-right">
<span id="username">Hi, Bandana</span>

<div class="credit-pill">
⚡ <span id="creditsLeft">10</span>
</div>
</div>

</header>

<!-- ================= APP ================= -->

<main class="app-container">

<!-- ================= DASHBOARD ================= -->

<section id="dashboardPage" class="page active">

<h1 class="title">Find the smartest deal</h1>

<div class="search-area">

  <div class="ai-search">

    <button id="uploadBtn" class="upload-btn">+</button>

    <input 
      id="productInput"
      type="text"
      placeholder="Search product or upload image"
      autocomplete="off"
    />

    <button id="searchBtn" class="primary">
      Search
    </button>

  </div>

  <!-- Hidden file input -->
  <input 
    type="file"
    id="imageInput"
    accept="image/*"
    capture="environment"
    style="display:none"
  />

</div>

<!-- FLOATING CARDS -->

<div class="suggest-row floating-row">
<div class="suggest-card">🔥 Phones</div>
<div class="suggest-card">🎧 Headphones</div>
<div class="suggest-card">💻 Laptops</div>
<div class="suggest-card">⌚ Watches</div>
</div>

<!-- AI THINKING -->

<div class="ai-thinking">
<div class="ai-brain"><div class="pulse"></div></div>
<div id="thinkingStream" class="thinking-stream"></div>
<div id="variantSelector" class="variant-box"></div>
<div id="dealResults" class="results-grid"></div>
</div>
</section>






</main>

<script src="../js/dashboard.js"></script>

</body>
</html>
